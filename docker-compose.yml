services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://saveenaboga:password@db:5432/task3_db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: saveenaboga
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task3_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saveenaboga -d task3_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
